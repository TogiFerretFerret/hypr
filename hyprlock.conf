
background {
    monitor =
    path = screenshot
    blur_size = 5
    blur_passes = 4
    noise = 0.01
    contrast = 1.2
    brightness = 0.65
    vibrancy = 0.15
    vibrancy_darkness = 0.1
}

# ─── Dark scrim bottom-right (like the SDDM) ───
shape {
    monitor =
    size = 800, 600
    color = rgba(00000099)
    rounding = -1
    position = 0, 0
    halign = right
    valign = bottom
    shadow_passes = 3
    shadow_size = 40
    shadow_color = rgba(00000088)
}

# ─── Input field — thin, minimal ───
input-field {
    monitor =
    size = 280, 42
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.8
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(5093e388)
    inner_color = rgba(15141Ecc)
    font_color = rgba(e1e2e9ff)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i><span foreground="#8899aa">enter password</span></i>
    hide_input = false
    rounding = 8
    font_family = JetBrainsMono Nerd Font
    position = -80, 160
    halign = right
    valign = bottom
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(00000044)
    fail_color = rgba(d0606088)
    fail_text = <i><span foreground="#d06060">authentication failed</span></i>
    fail_transition = 300
    check_color = rgba(5093e3aa)
}

# ─── Username — right-aligned, bottom area ───
label {
    monitor =
    text = $USER
    color = rgba(ffffffff)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = -80, 290
    halign = right
    valign = bottom
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(00000088)
}

